    server_name: "On Migration Sever"
    type: "VPS"
    computing_power: "1 vCPU, 512MB RAM"
    ip_address: "45.77.71.189"
    operating_system: "CentOS 7"
    web_server: "Nginx"
    hue: 35
    services:
      - id: "on-migration-frp"
        name: "FRP server"
        UI: "http://45.77.71.189:7500"
        check_url: "https://frps.trance-0.com/static/#/proxies/tcp"
        server_port: [7000, 8800]
        domains: ["frps.trance-0.com"]
      - id: "on-migration-ssh"
        name: "SSH server"
        server_port: 22
      - id: "on-migration-bt-panel"
        name: "BT panel"
        UI: "http://45.77.71.189:8888"
        server_port: 8888
        domains: ["bt.trance-0.com"]
    network:
