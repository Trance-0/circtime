# Full server configurations
# last updated: 2026-07-07
# Optional on any infrastructure/service/network node:
# render_padding: 1 means largest visual padding and smallest section; 5 means smallest padding and largest section.
# Omit render_padding to use deterministic-random sizing from the config hash.
settings:
  page_title: "Trance-0 Circtime"
  # Prefer the CIRCTIME_ADMIN_TOKEN repository secret for public repos.
  # Use this YAML value only for private repos or local deployments.
  admin_token: ""
  check_interval_minutes: 15
  history_retention_days: 365
  # Safety cap for 15-minute checks over 365 days: 4 * 24 * 365.
  history_limit: 35040
  concurrency: 4
  request:
    method: GET
    timeout_ms: 10000
    degraded_after_ms: 1500
    expected_status: [200, 204, 301, 302]
    degraded_status: [429, 500, 502, 503, 504]

infrastructure:
